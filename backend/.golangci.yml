version: "2"

# golangci-lint configuration for VolunteerSync backend
# Documentation: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  build-tags:
    - integration
  modules-download-mode: readonly
  go: '1.24'

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    
  disable:
    - funlen        # Function length (handled by gocyclo)
    - lll           # Line length (handled by editor)
    - exhaustruct   # Check struct initialization (too strict)
    - varnamelen    # Variable name length (too opinionated)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
