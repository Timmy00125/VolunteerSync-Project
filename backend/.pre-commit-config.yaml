# Pre-commit hooks for VolunteerSync backend
# See https://pre-commit.com for more information
# Install: pre-commit install

repos:
  # Go formatting and imports
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        name: Format Go code with gofmt
        description: Runs gofmt to format Go source files
      - id: go-imports
        name: Fix imports with goimports
        description: Runs goimports to organize and format imports
      - id: go-mod-tidy
        name: Tidy go.mod and go.sum
        description: Runs go mod tidy to ensure dependencies are up to date

  # golangci-lint
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.62.2
    hooks:
      - id: golangci-lint
        name: Run golangci-lint
        description: Fast linters runner for Go
        args: [--config=.golangci.yml]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-yaml
        name: Check YAML syntax
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        name: Check for large files
        args: [--maxkb=1000]
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-case-conflict
        name: Check for case conflicts
      - id: detect-private-key
        name: Detect private keys

  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: [--baseline, .secrets.baseline]
        exclude: go.sum
