name: CI Pipeline

on:
    push:
        branches:
            - main
            - "feature/**"
            - "bugfix/**"
    pull_request:
        branches:
            - main

env:
    GO_VERSION: "1.23"
    NODE_VERSION: "20"

jobs:
    # Backend linting
    backend-lint:
        name: Backend Linting
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: backend/go.sum

            - name: Cache Go modules
              uses: actions/cache@v4
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-

            - name: Install golangci-lint
              run: |
                  curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.61.0

            - name: Run golangci-lint
              working-directory: backend
              run: golangci-lint run --timeout=5m

    # Frontend linting
    frontend-lint:
        name: Frontend Linting
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: frontend
              run: npm ci

            - name: Run ESLint
              working-directory: frontend
              run: npm run lint

            - name: Run Prettier check
              working-directory: frontend
              run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}"

    # Backend unit and integration tests
    backend-test:
        name: Backend Tests
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: test_user
                    POSTGRES_PASSWORD: test_password
                    POSTGRES_DB: volunteersync_test
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

            redis:
                image: redis:7-alpine
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: backend/go.sum

            - name: Cache Go modules
              uses: actions/cache@v4
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-

            - name: Install dependencies
              working-directory: backend
              run: go mod download

            - name: Wait for PostgreSQL
              run: |
                  until pg_isready -h localhost -p 5432 -U test_user; do
                    echo "Waiting for PostgreSQL..."
                    sleep 2
                  done

            - name: Run database migrations
              working-directory: backend
              env:
                  DATABASE_URL: postgresql://test_user:test_password@localhost:5432/volunteersync_test?sslmode=disable
              run: |
                  go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
                  migrate -path migrations -database "$DATABASE_URL" up

            - name: Run unit tests
              working-directory: backend
              env:
                  DATABASE_URL: postgresql://test_user:test_password@localhost:5432/volunteersync_test?sslmode=disable
                  REDIS_URL: redis://localhost:6379
                  JWT_SECRET: test-jwt-secret-key-for-ci
                  ENV: test
              run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

            - name: Check test coverage
              working-directory: backend
              run: |
                  coverage=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
                  echo "Test coverage: ${coverage}%"
                  if (( $(echo "$coverage < 80" | bc -l) )); then
                    echo "Error: Test coverage ${coverage}% is below required 80%"
                    exit 1
                  fi

            - name: Upload backend coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                  files: ./backend/coverage.out
                  flags: backend
                  name: backend-coverage

    # Frontend unit tests
    frontend-test:
        name: Frontend Unit Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: frontend
              run: npm ci

            - name: Run Jest tests
              working-directory: frontend
              run: npm test -- --coverage --watchAll=false

            - name: Check test coverage
              working-directory: frontend
              run: |
                  coverage=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
                  echo "Test coverage: ${coverage}%"
                  if (( $(echo "$coverage < 80" | bc -l) )); then
                    echo "Error: Test coverage ${coverage}% is below required 80%"
                    exit 1
                  fi

            - name: Upload frontend coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                  files: ./frontend/coverage/coverage-final.json
                  flags: frontend
                  name: frontend-coverage

    # E2E tests with Playwright
    e2e-test:
        name: E2E Tests (Playwright)
        runs-on: ubuntu-latest
        needs: [backend-test, frontend-test]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              working-directory: frontend
              run: npm ci

            - name: Install Playwright browsers
              working-directory: frontend
              run: npx playwright install --with-deps chromium

            - name: Start services with Docker Compose
              run: |
                  docker compose -f docker/docker-compose.yml up -d
                  sleep 10

            - name: Wait for services to be ready
              run: |
                  timeout 60 bash -c 'until curl -f http://localhost:3000/api/health; do sleep 2; done'
                  timeout 60 bash -c 'until curl -f http://localhost:3001; do sleep 2; done'

            - name: Run Playwright E2E tests
              working-directory: frontend
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:3000
              run: npm run test:e2e

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: frontend/playwright-report/
                  retention-days: 30

            - name: Stop services
              if: always()
              run: docker compose -f docker/docker-compose.yml down

    # Build backend
    backend-build:
        name: Backend Build
        runs-on: ubuntu-latest
        needs: [backend-lint, backend-test]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: backend/go.sum

            - name: Build backend binary
              working-directory: backend
              run: |
                  CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o bin/api cmd/api/main.go

            - name: Upload backend binary
              uses: actions/upload-artifact@v4
              with:
                  name: backend-binary
                  path: backend/bin/api
                  retention-days: 7

    # Build frontend
    frontend-build:
        name: Frontend Build
        runs-on: ubuntu-latest
        needs: [frontend-lint, frontend-test]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: frontend
              run: npm ci

            - name: Build Next.js application
              working-directory: frontend
              env:
                  NEXT_PUBLIC_API_URL: https://api.volunteersync.example.com
              run: npm run build

            - name: Upload frontend build
              uses: actions/upload-artifact@v4
              with:
                  name: frontend-build
                  path: frontend/.next
                  retention-days: 7

    # Final status check
    ci-success:
        name: CI Pipeline Success
        runs-on: ubuntu-latest
        needs: [backend-build, frontend-build, e2e-test]
        if: success()
        steps:
            - name: CI Pipeline Passed
              run: echo "✅ All CI checks passed successfully!"
